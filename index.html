            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            background: rgba(255,255,255,0.95);

            max-width: 520px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 32px 24px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);

        }

        .header h1 { font-size: 28px; margin-bottom: 4px; }
        .header p { font-size: 14px; opacity: 0.9; }

        .tabs {
            display: flex;
            background: #f5f5f5;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #888;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: #ee5a24;
            background: white;
            border-bottom-color: #ee5a24;
        }

        .tab:hover { color: #ee5a24; }

        .panel { display: none; padding: 28px 24px 32px; }
        .panel.active { display: block; }

        /* === 外卖部分 === */
        .result-box {
            background: linear-gradient(135deg, #fff5f5, #ffe8e8);
            border: 2px dashed #ffcccc;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }

        .result-box.spin {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }

        .result-emoji { font-size: 48px; margin-bottom: 8px; }
        .result-text { font-size: 22px; font-weight: 700; color: #333; }
        .result-sub { font-size: 14px; color: #999; margin-top: 6px; }
        .result-placeholder { color: #ccc; font-size: 16px; }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            background: linear-gradient(135deg, #ee5a24, #ff6b6b);
            box-shadow: 0 4px 15px rgba(238,90,36,0.4);
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(238,90,36,0.5); }
        .btn:active { transform: translateY(0); }

        .fridge-section { margin-bottom: 20px; }

        .fridge-label {
            font-size: 14px;
            font-weight: 600;
            color: #666;
            margin-bottom: 10px;
        }

        .tag-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }

        .tag {
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            background: white;
            color: #555;
            transition: all 0.2s;
            user-select: none;
        }

        .tag:hover { border-color: #ee5a24; color: #ee5a24; }
        .tag.selected { background: #ee5a24; color: white; border-color: #ee5a24; }

        .custom-input-row {

            gap: 8px;
            margin-bottom: 16px;
        }

            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

            border-radius: 10px;
            background: #ee5a24;
            color: white;
            font-size: 14px;
            font-weight: 600;

            gap: 6px;
            margin-bottom: 16px;
            min-height: 28px;
        }

        .selected-chip {

            background: #fff0e6;
            border: 1px solid #ffccaa;
            border-radius: 14px;
            font-size: 12px;
            color: #ee5a24;
            display: flex;
            align-items: center;
            gap: 4px;
        }

            font-weight: bold;
            margin-left: 2px;
        }

        .recipe-result {
            background: #f9f9f9;
            border-radius: 14px;
            padding: 20px;
            margin-top: 16px;
            display: none;
        }

            font-weight: 700;
            color: #333;

        }

        }

    <div class="container">

            <p>选择困难症终结者</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('delivery')">点外卖</button>
            <button class="tab" onclick="switchTab('cook')">自己做</button>
        </div>

        <!-- 外卖 -->
        <div id="delivery" class="panel active">
            <div class="exclusion-section">
                <div class="fridge-label">不吃什么（输入菜系或食物名，会自动排除）</div>
                <div class="custom-input-row">
                    <input type="text" id="exclusionInput" placeholder="如：西餐、内脏、香菜..." onkeydown="if(event.key==='Enter')addExclusion()">
                    <button onclick="addExclusion()">添加</button>
                </div>
                <div class="selected-ingredients" id="exclusionList"></div>
            </div>

            <div class="result-box" id="deliveryResult">
                <span class="result-placeholder">点击下方按钮决定命运</span>
            </div>
            <button class="btn" onclick="rollDelivery()">🎲 随机一下！</button>

            <div class="history-section" id="deliveryHistorySection" style="display:none;">
                <div class="history-title">
                    最近吃过的
                    <span class="clear-history" onclick="clearHistory('delivery')">清空</span>
                </div>
                <div class="history-list" id="deliveryHistory"></div>
            </div>
        </div>

        <!-- 做饭 -->
        <div id="cook" class="panel">
            <div class="fridge-section">
                <div class="fridge-label">选择你冰箱里的食材</div>
                <div class="tag-group" id="commonTags"></div>

                <div class="custom-input-row">
                    <input type="text" id="customIngredient" placeholder="添加其他食材..." onkeydown="if(event.key==='Enter')addCustom()">
                    <button onclick="addCustom()">添加</button>
                </div>

                <div class="selected-ingredients" id="selectedList"></div>
            </div>

            <button class="btn" onclick="rollCook()">🍳 能做什么菜？</button>

            <div class="recipe-result" id="recipeResult"></div>

            <div class="history-section" id="cookHistorySection" style="display:none;">
                <div class="history-title">
                    做过的菜
                    <span class="clear-history" onclick="clearHistory('cook')">清空</span>
                </div>
                <div class="history-list" id="cookHistory"></div>
            </div>
        </div>
    </div>

// ============ 状态 ============
let selectedIngredients = [];
let exclusions = JSON.parse(localStorage.getItem('exclusions') || '[]');
let deliveryHistory = JSON.parse(localStorage.getItem('deliveryHistory') || '[]');
let cookHistory = JSON.parse(localStorage.getItem('cookHistory') || '[]');

// ============ Tab 切换 ============
function switchTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(id).classList.add('active');
}

// ============ 外卖排除 ============
function addExclusion() {
    const input = document.getElementById('exclusionInput');
    const val = input.value.trim();
    if (!val || exclusions.includes(val)) { input.value = ''; return; }
    exclusions.push(val);
    localStorage.setItem('exclusions', JSON.stringify(exclusions));
    input.value = '';
    renderExclusions();
}

function removeExclusion(name) {
    exclusions = exclusions.filter(i => i !== name);
    localStorage.setItem('exclusions', JSON.stringify(exclusions));
    renderExclusions();
}

function renderExclusions() {
    const container = document.getElementById('exclusionList');
    if (exclusions.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = exclusions.map(name =>
        `<span class="exclusion-chip">不吃 ${name}<span class="remove" onclick="removeExclusion('${name}')">&times;</span></span>`
    ).join('');
}

function getAvailableDelivery() {
    if (exclusions.length === 0) return deliveryData;
    return deliveryData.filter(item => {
        return !exclusions.some(ex => {
            const lower = ex.toLowerCase();
            return item.tag.toLowerCase().includes(lower) || item.name.toLowerCase().includes(lower);
        });
    });
}

// ============ 外卖随机 ============
function rollDelivery() {
    const box = document.getElementById('deliveryResult');
    const available = getAvailableDelivery();

    if (available.length === 0) {
        box.innerHTML = '<span class="result-placeholder">排除太多了，没东西可吃了...</span>';
        return;
    }

    box.classList.add('spin');

    let count = 0;
    const total = 20;
    const interval = setInterval(() => {
        const item = available[Math.floor(Math.random() * available.length)];
        box.innerHTML = `<span class="result-emoji">${item.emoji}</span><span class="result-text">${item.name}</span>`;
        count++;
        if (count >= total) {
            clearInterval(interval);
            box.classList.remove('spin');
            const final = available[Math.floor(Math.random() * available.length)];
            box.innerHTML = `<span class="result-emoji">${final.emoji}</span><span class="result-text">${final.name}</span><span class="result-sub">${final.tag}</span>`;
            addHistory('delivery', final.name);
        }
    }, 80);
}

// ============ 做饭 ============
function initTags() {
    const container = document.getElementById('commonTags');
    commonIngredients.forEach(item => {
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.textContent = `${item.emoji} ${item.name}`;
        tag.onclick = () => toggleIngredient(item.name, tag);
        container.appendChild(tag);
    });
}

function toggleIngredient(name, el) {
    if (selectedIngredients.includes(name)) {
        selectedIngredients = selectedIngredients.filter(i => i !== name);
        el.classList.remove('selected');
    } else {
        selectedIngredients.push(name);
        el.classList.add('selected');
    }
    renderSelected();
}

function addCustom() {
    const input = document.getElementById('customIngredient');
    const val = input.value.trim();
    if (!val || selectedIngredients.includes(val)) { input.value = ''; return; }
    selectedIngredients.push(val);
    input.value = '';
    renderSelected();
}

function removeIngredient(name) {
    selectedIngredients = selectedIngredients.filter(i => i !== name);
    document.querySelectorAll('.tag').forEach(t => {
        if (t.textContent.includes(name)) t.classList.remove('selected');
    });
    renderSelected();
}

function renderSelected() {
    const container = document.getElementById('selectedList');
    if (selectedIngredients.length === 0) {
        container.innerHTML = '';
        return;
    }
    container.innerHTML = selectedIngredients.map(name =>
        `<span class="selected-chip">${name}<span class="remove" onclick="removeIngredient('${name}')">&times;</span></span>`
    ).join('');
}

function rollCook() {
    const resultBox = document.getElementById('recipeResult');
    resultBox.classList.add('show');

    if (selectedIngredients.length === 0) {
        resultBox.innerHTML = '<div class="no-recipe">请先选择你冰箱里的食材</div>';
        return;
    }

    // 找到所有匹配的菜谱（按匹配度排序）
    const matched = recipeDB
        .map(recipe => ({
            ...recipe,
            matchCount: recipe.need.filter(n => selectedIngredients.includes(n)).length,
            matchAll: recipe.need.every(n => selectedIngredients.includes(n))
        }))
        .filter(r => r.matchCount > 0)
        .sort((a, b) => b.matchCount - a.matchCount);

    if (matched.length === 0) {
        resultBox.innerHTML = `
            <div class="no-recipe">
                没找到能做的菜...<br>
                <span style="font-size:12px;margin-top:8px;display:block;">试试加更多食材？</span>
            </div>`;
        return;
    }

    // 按匹配度分组，从高到低随机选4-5道
    const groups = {};
    matched.forEach(r => {
        if (!groups[r.matchCount]) groups[r.matchCount] = [];
        groups[r.matchCount].push(r);
    });

    const sortedKeys = Object.keys(groups).map(Number).sort((a, b) => b - a);
    let picks = [];
    for (const key of sortedKeys) {
        const shuffled = groups[key].sort(() => Math.random() - 0.5);
        for (const r of shuffled) {
            if (picks.length >= 5) break;
            picks.push(r);
        }
        if (picks.length >= 5) break;
    }

    let html = `<div style="font-size:15px;font-weight:700;color:#333;margin-bottom:16px;">为你推荐 ${picks.length} 道菜：</div>`;

    picks.forEach((pick, idx) => {
        const missing = pick.need.filter(n => !selectedIngredients.includes(n));
        const isFull = missing.length === 0;
        html += `
            <div class="recipe-card">
                <div class="recipe-name">${idx + 1}. ${pick.name}</div>
                ${isFull
                    ? '<div style="font-size:12px;color:#4caf50;margin-bottom:6px;">食材齐全</div>'
                    : `<div style="font-size:12px;color:#ee5a24;margin-bottom:6px;">还需: ${missing.join('、')}</div>`
                }
                <div class="recipe-section-title">食材</div>
                <div class="recipe-list">${pick.ingredients.join('、')}</div>
                <div class="recipe-section-title">做法</div>
                <ol class="recipe-steps">${pick.steps.map(s => `<li>${s}</li>`).join('')}</ol>
            </div>
        `;
    });

    resultBox.innerHTML = html;
    addHistory('cook', picks.map(p => p.name).join('、'));
}

// ============ 历史记录 ============
function addHistory(type, name) {
    const list = type === 'delivery' ? deliveryHistory : cookHistory;
    list.unshift(name);
    if (list.length > 10) list.pop();
    localStorage.setItem(type + 'History', JSON.stringify(list));
    renderHistory(type);
}

function renderHistory(type) {
    const list = type === 'delivery' ? deliveryHistory : cookHistory;
    const section = document.getElementById(type + 'HistorySection');
    const container = document.getElementById(type + 'History');
    if (list.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    container.innerHTML = list.map(name => `<span class="history-item">${name}</span>`).join('');
}

function clearHistory(type) {
    if (type === 'delivery') deliveryHistory = [];
    else cookHistory = [];
    localStorage.setItem(type + 'History', '[]');
    renderHistory(type);
}
